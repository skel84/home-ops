controllers:
  bazarr:
    annotations:
      reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        fsGroup: 65534
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 65542 # gladius:external-services

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/bazarr
          tag: 1.5.6@sha256:79fc37491f55c7e24427bcd669bce3df2d7415ca432a47ce9d53cc5988af8411
          pullPolicy: IfNotPresent
        env:
          BAZARR__PORT: &port 6767
          TZ: "Europe/Rome"
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 20m
            memory: 256Mi
          limits:
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

service:
  app:
    controller: bazarr
    ports:
      http:
        port: *port

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 2Gi
    storageClass: longhorn
    globalMounts:
      - path: /config
  tmp:
    type: emptyDir
  movies:
    type: nfs
    server: 192.168.0.217
    path: /volume1/Media/Movies
    globalMounts:
      - path: /movies
  shows:
    type: nfs
    server: 192.168.0.217
    path: /volume1/Media/Shows
    globalMounts:
      - path: /tv
  downloads:
    type: nfs
    server: 192.168.0.217
    path: /volume1/Download
    globalMounts:
      - path: /downloads

ingress:
  app:
    className: internal
    hosts:
      - host: "{{ .Release.Name }}.rbl.lol"
        paths:
          - path: /
            service:
              identifier: app
              port: *port
