---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: barmanbackup.home-ops.io
spec:
  schema:
    apiVersion: v1alpha1
    group: home-ops.io
    kind: BarmanBackup
    spec:
      cluster: string | required=true
      namespace: string | required=true
      schedule: string | default="0 2 * * *"
      retentionDays: integer | default=14 minimum=1 maximum=365
      endpoint: string | required=true
      bucket: string | required=true
      accessKeyId: string | required=true
      secretAccessKey: string | required=true
      immediate: boolean | default=false
    status:
      lastCheckTime: ${backupSchedule.status.lastCheckTime}
      nextScheduleTime: ${backupSchedule.status.nextScheduleTime}
  resources:
    - id: backupSecret
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: "${schema.metadata.name}-barman"
          namespace: ${schema.spec.namespace}
          labels:
            cnpg.io/reload: "true"
        type: Opaque
        stringData:
          ACCESS_KEY_ID: ${schema.spec.accessKeyId}
          SECRET_ACCESS_KEY: ${schema.spec.secretAccessKey}

    - id: backupSchedule
      template:
        apiVersion: postgresql.cnpg.io/v1
        kind: ScheduledBackup
        metadata:
          name: "${schema.metadata.name}-schedule"
          namespace: ${schema.spec.namespace}
        spec:
          cluster:
            name: ${schema.spec.cluster}
          schedule: ${schema.spec.schedule}
          method: barmanObjectStore
          online: true
          backupOwnerReference: self
          immediate: ${schema.spec.immediate}
      readyWhen:
        - ${backupSchedule.status.lastCheckTime != null}
