---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: webstack.home-ops.io
spec:
  schema:
    apiVersion: v1alpha1
    group: home-ops.io
    kind: WebStack
    types:
      ResourceSlice:
        cpu: string | default="100m"
        memory: string | default="256Mi"
    spec:
      image: string | required=true
      replicas: integer | default=1 minimum=1
      appPort: integer | default=8080 minimum=1 maximum=65535
      password: string | required=true
      resources:
        requests: ResourceSlice
        limits: ResourceSlice
      postgres:
        instances: integer | default=1 minimum=1 maximum=5
        pooler:
          enabled: boolean | default=true
          instances: integer | default=1 minimum=1 maximum=5
      ingress:
        enabled: boolean | default=false
        host: string | default=""
        className: string | default="nginx"
        annotations: "map[string]string | default={}"
    status:
      appNamespace: ${webapp.status.namespace}
      dbNamespace: ${postgres.status.namespace}
      appReady: ${webapp.status.appReady}
      dbReady: ${postgres.status.ready}
      poolerService: ${postgres.status.poolerService}
      connectionSecret: "${webapp.status.namespace}/pg-conn"

  resources:
    - id: postgres
      template:
        apiVersion: home-ops.io/v1alpha1
        kind: Postgres
        metadata:
          name: "${schema.metadata.name + '-pg'}"
        spec:
          instances: ${schema.spec.postgres.instances}
          password: ${schema.spec.password}
          pooler:
            enabled: ${schema.spec.postgres.pooler.enabled}
            instances: ${schema.spec.postgres.pooler.instances}

    - id: webapp
      template:
        apiVersion: home-ops.io/v1alpha1
        kind: WebApp
        metadata:
          name: "${schema.metadata.name + '-app'}"
        spec:
          image: ${schema.spec.image}
          replicas: ${schema.spec.replicas}
          appPort: ${schema.spec.appPort}
          resources: ${schema.spec.resources}
          ingress:
            enabled: ${schema.spec.ingress.enabled}
            host: ${schema.spec.ingress.host}
            className: ${schema.spec.ingress.className}
            annotations: ${schema.spec.ingress.annotations}

    - id: connSecret
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: pg-conn
          namespace: "${schema.metadata.name + '-app'}"
        type: Opaque
        stringData:
          DATABASE_USER: app
          DATABASE_NAME: appdb
          DATABASE_HOST: "${postgres.status.namespace + '.' + postgres.status.readWriteService + '.svc.cluster.local'}"
          DATABASE_PASSWORD: ${schema.spec.password}
