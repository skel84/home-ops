apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  labels:
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/component: builder
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkitd
      app.kubernetes.io/component: builder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkitd
        app.kubernetes.io/component: builder
      annotations:
        container.apparmor.security.beta.kubernetes.io/buildkitd: unconfined
    spec:
      serviceAccountName: buildkitd
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: Unconfined
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.30.0
          imagePullPolicy: IfNotPresent
          args:
            - --addr
            - unix:///run/buildkit/buildkitd.sock
            - --addr
            - tcp://0.0.0.0:1234
            - --config
            - /etc/buildkit/buildkitd.toml
            - --oci-worker-gc
            - --oci-worker-gc-keepstorage=20000
          env:
            - name: HOME
              value: /root
            - name: USER
              value: root
            - name: BUILDKIT_SESSION_KEYRING
              value: "0"
          ports:
            - name: buildkit
              containerPort: 1234
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: buildkit
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: buildkit
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          securityContext:
            privileged: true
          volumeMounts:
            - name: config
              mountPath: /etc/buildkit
              readOnly: true
            - name: state
              mountPath: /var/lib/buildkit
            - name: runtime
              mountPath: /run/buildkit
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: buildkitd-config
        - name: state
          emptyDir: {}
        - name: runtime
          emptyDir:
            medium: Memory
        - name: tmp
          emptyDir: {}
