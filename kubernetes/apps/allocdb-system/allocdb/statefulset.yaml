apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: allocdb
  namespace: allocdb-system
  labels:
    app.kubernetes.io/name: allocdb
spec:
  serviceName: allocdb-internal
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: allocdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: allocdb
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 65532
      containers:
        - name: allocdb
          image: docker.io/skel84/allocdb:staging-8cc9257
          imagePullPolicy: IfNotPresent
          ports:
            - name: control
              containerPort: 17000
            - name: client
              containerPort: 18000
            - name: protocol
              containerPort: 19000
          env:
            - name: ALLOCDB_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: ALLOCDB_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ALLOCDB_STATEFULSET_NAME
              value: allocdb
            - name: ALLOCDB_HEADLESS_SERVICE
              value: allocdb-internal
            - name: ALLOCDB_CLUSTER_DOMAIN
              value: cluster.local
            - name: ALLOCDB_WORKSPACE_ROOT
              value: /var/lib/allocdb
            - name: ALLOCDB_RESOLVE_TIMEOUT_SECS
              value: "30"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - exec /usr/local/bin/allocdb-local-cluster control-status --addr "${ALLOCDB_POD_IP}:17000"
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - exec /usr/local/bin/allocdb-local-cluster control-status --addr "${ALLOCDB_POD_IP}:17000"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - exec /usr/local/bin/allocdb-local-cluster control-status --addr "${ALLOCDB_POD_IP}:17000"
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /var/lib/allocdb
            - name: run
              mountPath: /run/allocdb
      volumes:
        - name: run
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-strict-local-wffc
        resources:
          requests:
            storage: 10Gi
