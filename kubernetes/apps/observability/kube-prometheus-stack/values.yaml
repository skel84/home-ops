crds:
  enabled: true
  upgradeJob:
    enabled: true
    forceConflicts: true
cleanPrometheusOperatorObjectNames: true
alertmanager:
  ingress:
    enabled: true
    ingressClassName: internal
    hosts:
      - alertmanager.rbl.lol
  alertmanagerSpec:
    externalUrl: https://alertmanager.rbl.lol
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 1Gi
kubeEtcd:
  service:
    selector:
      component: kube-apiserver # etcd runs on control plane nodes
kubeProxy:
  enabled: false
prometheus:
  ingress:
    enabled: true
    ingressClassName: internal
    annotations: {}
    hosts:
      - prometheus.rbl.lol
  prometheusSpec:
    #   image:
    #     registry: docker.io
    #     repository: prom/prometheus
    #     tag: v2.53.4
    #   securityContext:
    #     runAsNonRoot: true
    #     runAsUser: 64535
    #     runAsGroup: 64535
    #     fsGroup: 64535
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    # Enable discovery of ServiceMonitors with any labels
    serviceMonitorSelector: {}
    # Enable discovery of PodMonitors with any labels
    podMonitorSelector: {}
    # Enable discovery of PrometheusRules with any labels
    ruleSelector: {}
    # Enable discovery of Probes with any labels
    probeSelector: {}
    # Enable discovery of ScrapeConfigs with any labels
    scrapeConfigSelector: {}
    retention: 3d
    retentionSize: 15GB
    maximumStartupDurationSeconds: 7200
    resources:
      requests:
        cpu: 100m
        memory: 4Gi
      limits:
        memory: 4Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 20Gi
prometheus-node-exporter:
  fullnameOverride: node-exporter
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node
kube-state-metrics:
  fullnameOverride: kube-state-metrics
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[*]
    - persistentvolumeclaims=[*]
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels: ["__meta_kubernetes_pod_node_name"]
          targetLabel: kubernetes_node
grafana:
  enabled: false
  forceDeployDashboards: true
