hyperdx:
  config:
    FRONTEND_URL: https://hyperdx.rbl.lol
  deployment:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi
  ingress:
    enabled: true
    spec:
      ingressClassName: internal
      rules:
        - host: hyperdx.rbl.lol
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: clickstack-app
                    port:
                      number: 3000

mongodb:
  spec:
    statefulSet:
      spec:
        volumeClaimTemplates:
          - metadata:
              name: data-volume
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: longhorn-strict-local-wffc
              resources:
                requests:
                  storage: 2Gi
          - metadata:
              name: logs-volume
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: longhorn-strict-local-wffc
              resources:
                requests:
                  storage: 2Gi

clickhouse:
  keeper:
    spec:
      dataVolumeClaimSpec:
        storageClassName: longhorn-strict-local-wffc
  cluster:
    spec:
      dataVolumeClaimSpec:
        storageClassName: longhorn-strict-local-wffc
        resources:
          requests:
            storage: 2Gi

otel-collector:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
