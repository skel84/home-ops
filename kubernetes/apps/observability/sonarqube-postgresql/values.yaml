auth:
  enablePostgresUser: true
  username: sonar
  database: sonarqube
  existingSecret: sonarqube-postgresql-secret
architecture: standalone
primary:
  persistence:
    enabled: true
    storageClass: longhorn
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
