---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: gpu-control-plane
    control-plane: controller-manager
  name: gpu-control-plane-controller-manager-metrics-service
  namespace: gpu-control-plane-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: gpu-control-plane
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: gpu-control-plane
    control-plane: controller-manager
  name: gpu-control-plane-controller-manager
  namespace: gpu-control-plane-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-control-plane
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: gpu-control-plane
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --allocdb-mode=tcp
        - --allocdb-address=allocdb-primary-bootstrap.allocdb-system.svc.cluster.local:18000
        - --allocdb-pool=example.com/gpu/test-flavor=11,12,13,14
        command:
        - /manager
        image: docker.io/skel84/gpu-control-plane:staging-cbe3544
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: gpu-control-plane-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
