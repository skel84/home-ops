---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipelines-as-code
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/pipelines-as-code/pipelines-as-code
      targetRevision: main
  destination:
    name: in-cluster
    namespace: pipelines-as-code
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
