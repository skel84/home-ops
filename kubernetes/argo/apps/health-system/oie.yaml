---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oie
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  source:
    repoURL: "https://github.com/skel84/home-ops.git"
    path: kubernetes/apps/health-system/oie
    targetRevision: main
  destination:
    name: in-cluster
    namespace: health-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
