---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oie-postgresql
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/health-system/oie-postgresql
      targetRevision: main
      ref: repo
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/health-system/oie-postgresql/chart/postgresql
      targetRevision: main
      helm:
        releaseName: oie-postgresql
        valueFiles:
          - $repo/kubernetes/apps/health-system/oie-postgresql/values.yaml
          - $repo/kubernetes/apps/health-system/oie-postgresql/values.sops.yaml
  destination:
    name: in-cluster
    namespace: health-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
