---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plausible
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/observability/plausible
      targetRevision: main
      ref: repo
    - repoURL: "https://imio.github.io/helm-charts"
      chart: "plausible-analytics"
      targetRevision: "0.4.2"
      helm:
        releaseName: plausible
        valueFiles:
          - $repo/kubernetes/apps/observability/plausible/values.sops.yaml
  destination:
    name: in-cluster
    namespace: observability
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
