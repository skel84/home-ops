---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-pipelines
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/tekton-pipelines/tekton-pipelines
      targetRevision: main
      ref: repo
    - repoURL: https://cdfoundation.github.io/tekton-helm-chart
      chart: tekton-pipeline
      targetRevision: 1.12.2
      helm:
        releaseName: tekton-pipelines
        valueFiles:
          - $repo/kubernetes/apps/tekton-pipelines/tekton-pipelines/values.yaml
  destination:
    name: in-cluster
    namespace: tekton-pipelines
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
