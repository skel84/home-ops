---
kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: longhorn-storageclasses
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/longhorn-system/storageclasses
      targetRevision: main
      ref: repo
  destination:
    name: in-cluster
    namespace: longhorn-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
