---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubero-operator
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: kubernetes
  source:
    repoURL: "https://github.com/skel84/home-ops.git"
    targetRevision: main
    path: kubernetes/apps/kubero/operator
  destination:
    name: in-cluster
    namespace: kubero-operator-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
