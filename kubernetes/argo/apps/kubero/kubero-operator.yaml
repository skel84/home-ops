---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubero-operator
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: kubernetes
  source:
    repoURL: https://github.com/kubero-dev/kubero-operator.git
    targetRevision: ea8327a69924ce61493dedfd02595d28ae81cbce
    path: deploy
    directory:
      include: operator.yaml
  destination:
    name: in-cluster
    namespace: kubero-operator-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
