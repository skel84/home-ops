---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulumi-kubernetes-operator
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: >-
        kubernetes/apps/pulumi-kubernetes-operator/pulumi-kubernetes-operator
      targetRevision: main
      ref: repo
    - repoURL: ghcr.io/pulumi/helm-charts
      chart: pulumi-kubernetes-operator
      targetRevision: 2.7.0
      helm:
        releaseName: pulumi-kubernetes-operator
        valueFiles:
          - $repo/kubernetes/apps/pulumi-kubernetes-operator/pulumi-kubernetes-operator/values.yaml
  destination:
    name: in-cluster
    namespace: pulumi-kubernetes-operator
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
