---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gpu-e2e
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/gpu-e2e/gpu-e2e
      targetRevision: main
      ref: repo
  destination:
    name: in-cluster
    namespace: gpu-e2e
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
