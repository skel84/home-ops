---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fission-crds
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: kubernetes
  source:
    repoURL: "https://github.com/skel84/home-ops.git"
    path: kubernetes/apps/fission/fission-crds
    targetRevision: main
  destination:
    name: in-cluster
    namespace: fission
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
