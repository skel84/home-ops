---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kueue
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/kueue-system/kueue
      targetRevision: main
      ref: repo
    - repoURL: oci://registry.k8s.io/kueue/charts
      chart: kueue
      targetRevision: 0.16.4
      helm:
        releaseName: kueue
        valueFiles:
          - $repo/kubernetes/apps/kueue-system/kueue/values.yaml
  destination:
    name: in-cluster
    namespace: kueue-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
