---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/cnpg-system/cloudnative-pg
      targetRevision: main
      ref: repo
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cloudnative-pg
      targetRevision: 0.29.0
      helm:
        releaseName: cloudnative-pg
        valueFiles:
          - $repo/kubernetes/apps/cnpg-system/cloudnative-pg/values.yaml
  destination:
    name: in-cluster
    namespace: cnpg-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
