---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/skel84/home-ops.git"
      path: kubernetes/apps/forgejo/forgejo
      targetRevision: main
      ref: repo
    - repoURL: codeberg.org/forgejo-contrib
      chart: forgejo
      targetRevision: 17.0.1
      helm:
        releaseName: forgejo
        valueFiles:
          - $repo/kubernetes/apps/forgejo/forgejo/values.yaml
  destination:
    name: in-cluster
    namespace: forgejo
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
